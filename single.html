<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Single — Freddie Freeloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0a0a;
      --bg2: #160d0d;
      --bg3: #1c1010;
      --accent: #c8a96e;
      --accent2: #7ecac8;
      --text: #e8ddd0;
      --muted: #6b5a52;
      --border: #2a1e1e;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 9999;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,10,10,0.96);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }
    .nav-back svg { width: 14px; }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* LEFT */
    .left-col {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .album-cover-wrap {
      flex-shrink: 0;
      aspect-ratio: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .album-cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(15%);
    }

    .album-cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1010 0%, #2a1a0a 50%, #0a1520 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .album-cover-placeholder svg { opacity: 0.1; width: 80px; }

    .single-identity {
      padding: 1.8rem 1.4rem 1.4rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .single-type-label {
      font-size: 0.58rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 0.6rem;
    }

    .single-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    .single-meta {
      display: flex;
      gap: 1.4rem;
      font-size: 0.63rem;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .single-meta span { color: var(--accent2); }

    .single-track-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.4rem;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
    }

    .play-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
      background: none;
      cursor: pointer;
    }

    .play-btn:hover { background: rgba(200,169,110,0.1); }
    .play-btn svg { width: 11px; fill: var(--accent); margin-left: 1px; }
    .play-btn.playing svg { display: none; }
    .play-btn.playing::after {
      content: '';
      display: block;
      width: 10px;
      height: 12px;
      background: linear-gradient(
        to right,
        var(--accent) 0px, var(--accent) 3px,
        transparent 3px, transparent 7px,
        var(--accent) 7px, var(--accent) 10px
      );
      border-radius: 1px;
    }

    .single-track-title {
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      color: var(--accent);
      flex: 1;
    }

    .single-track-duration {
      font-size: 0.63rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .left-col-spacer { flex: 1; }

    /* MIDDLE */
    .middle-col {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .now-playing-header {
      padding: 1.6rem 2rem 1.2rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .now-playing-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .now-playing-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--accent);
    }

    .waveform-section {
      padding: 1.8rem 2rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #waveform-canvas {
      width: 100%;
      height: 80px;
      cursor: pointer;
      display: block;
    }

    .scrubber-wrap { margin-top: 1rem; }

    #scrubber {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 1.4rem 2rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.2s;
      display: flex;
      align-items: center;
      padding: 0;
    }
    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .ctrl-btn.main-play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      justify-content: center;
    }
    .ctrl-btn.main-play:hover { background: rgba(200,169,110,0.1); }
    .ctrl-btn.main-play svg { width: 18px; height: 18px; margin-left: 2px; }

    audio { display: none; }

    /* RIGHT */
    .right-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .lyrics-header {
      padding: 1.6rem 2rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .lyrics-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .lyrics-song-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--text);
    }

    .lyrics-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .lyrics-scroll::-webkit-scrollbar { width: 4px; }
    .lyrics-scroll::-webkit-scrollbar-track { background: transparent; }
    .lyrics-scroll::-webkit-scrollbar-thumb { background: var(--border); }

    .lyrics-body {
      font-size: 0.85rem;
      line-height: 2.1;
      color: var(--text);
      letter-spacing: 0.03em;
      white-space: pre-wrap;
    }
    .lyrics-body .verse-break { display: block; height: 1.6rem; }

    .lyrics-placeholder {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 2;
      letter-spacing: 0.05em;
    }
    .lyrics-placeholder em { color: var(--accent2); font-style: italic; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">FФ.</a>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
</nav>

<div class="layout">

  <!-- LEFT -->
  <div class="left-col">
    <div class="album-cover-wrap" id="cover-wrap"></div>

    <div class="single-identity">
      <div class="single-type-label">Single</div>
      <div class="single-name" id="single-name">—</div>
      <div class="single-meta">
        <div><span id="single-year">—</span></div>
        <div><span id="single-duration">—</span></div>
      </div>
    </div>

    <div class="single-track-row" id="single-track-row">
      <button class="play-btn" id="row-play-btn">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <span class="single-track-title" id="row-track-title">—</span>
      <span class="single-track-duration" id="row-track-duration">—</span>
    </div>

    <div class="left-col-spacer"></div>
  </div>

  <!-- MIDDLE -->
  <div class="middle-col">
    <div class="now-playing-header">
      <div class="now-playing-label">Now Playing</div>
      <div class="now-playing-title" id="now-playing-title">—</div>
    </div>

    <div class="waveform-section">
      <canvas id="waveform-canvas"></canvas>
      <div class="scrubber-wrap">
        <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1">
        <div class="time-row">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn main-play" id="btn-play" title="Play/Pause">
        <svg id="icon-play" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
    </div>

    </div>

  <!-- RIGHT -->
  <div class="right-col">
    <div class="lyrics-header">
      <div class="lyrics-label">Lyrics</div>
      <div class="lyrics-song-title" id="lyrics-title">—</div>
    </div>
    <div class="lyrics-scroll">
      <div class="lyrics-body" id="lyrics-body">
        <span class="lyrics-placeholder">Loading...</span>
      </div>
    </div>
  </div>

</div>

<audio id="audio-player"></audio>

<script>
// ════════════════════════════════════════════════
//  ✏️  EDIT YOUR SINGLES HERE
//
//  title    → must match the card title on index.html
//  year     → release year
//  duration → display string e.g. "3:42"
//  cover    → path to cover image e.g. "covers/single1.jpg" (or "" for placeholder)
//  file     → path to your MP3 inside the audio/ subfolder
//             e.g. "audio/my-single.mp3"
//  lyrics   → paste full lyrics between the backticks
//
//  📁 Put your MP3s in:  audio/  (next to single.html)
//  The index (0, 1, 2...) matches the order of single cards on index.html
// ════════════════════════════════════════════════
const SINGLES = [
  {
    title: "Another Day of Bygones",
    year: "2024",                       // ✏️ REPLACE: release year if different
    duration: "3:42",                   // ✏️ REPLACE: actual duration
    cover: "covers/cover1.jpg",
    file: "audio/another-day-of-bygones.mp3",
    lyrics: ``                          // ✏️ REPLACE: paste your lyrics here
  },
  {
    title: "Rebel Moon",                // ✏️ REPLACE: release year if different
    year: "2025",
    duration: "4:10",                   // ✏️ REPLACE: actual duration
    cover: "covers/cover2.png",
    file: "audio/rebel-moon.mp3",
    lyrics: ``                          // ✏️ REPLACE: paste your lyrics here
  },
  {
    title: "A Divine Comedy",
    year: "2025",
    duration: "5:31",
    cover: "covers/cover4.png",
    file: "audio/A-Divine-Comedy.mp3",
    lyrics: ``
  },
  {
    title: "Walking",
    year: "2025",
    duration: "7:01",
    cover: "covers/cover3.png",
    file: "audio/walking-mastered.mp3",
    lyrics: ``
  },
  {
    title: "We, As The City Devised",
    year: "2025",
    duration: "7:46",
    cover: "covers/cover5.png",
    file: "audio/we-as-the-city-devised.mp3",
    lyrics: ``
  },
];

// ════════ ENGINE ════════
const audio = document.getElementById('audio-player');
const canvas = document.getElementById('waveform-canvas');
const ctx2d = canvas.getContext('2d');
const scrubber = document.getElementById('scrubber');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');
const btnPlay = document.getElementById('btn-play');
const iconPlay = document.getElementById('icon-play');
const iconPause = document.getElementById('icon-pause');
const rowPlayBtn = document.getElementById('row-play-btn');
const singleTrackRow = document.getElementById('single-track-row');
let waveformData = null;
let audioCtx = null;

// Read ?id= from URL to know which single to show
const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id') || '0', 10);
const single = SINGLES[id] || SINGLES[0];

// Fill in all the text
document.title = `${single.title} — Freddie Freeloader`;
document.getElementById('single-name').textContent = single.title;
document.getElementById('single-year').textContent = single.year;
document.getElementById('single-duration').textContent = single.duration;
document.getElementById('row-track-title').textContent = single.title;
document.getElementById('row-track-duration').textContent = single.duration;
document.getElementById('now-playing-title').textContent = single.title;
document.getElementById('lyrics-title').textContent = single.title;

// Cover
const coverWrap = document.getElementById('cover-wrap');
if (single.cover) {
  coverWrap.innerHTML = `<img class="album-cover-img" src="${single.cover}" alt="${single.title}">`;
} else {
  coverWrap.innerHTML = `<div class="album-cover-placeholder"><svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" stroke="white" stroke-width="2"/><circle cx="50" cy="50" r="8" fill="white"/><line x1="50" y1="5" x2="50" y2="95" stroke="white" stroke-width="1"/><line x1="5" y1="50" x2="95" y2="50" stroke="white" stroke-width="1"/></svg></div>`;
}

// Lyrics
const lyricsBody = document.getElementById('lyrics-body');
if (single.lyrics && single.lyrics.trim()) {
  lyricsBody.innerHTML = '';
  lyricsBody.className = 'lyrics-body';
  single.lyrics.split('\n').forEach(line => {
    const el = document.createElement('span');
    if (line.trim() === '') {
      el.className = 'verse-break';
    } else if (line.startsWith('[')) {
      el.style.cssText = 'color:var(--accent);font-size:0.7rem;letter-spacing:0.2em;display:block;margin-top:0.5rem;';
      el.textContent = line;
    } else {
      el.style.display = 'block';
      el.textContent = line;
    }
    lyricsBody.appendChild(el);
  });
} else {
  lyricsBody.innerHTML = `<span class="lyrics-placeholder">No lyrics available.</span>`;
}

// Audio
if (single.file) {
  audio.src = single.file;
  loadWaveformFromSrc(single.file);
} else {
  waveformData = fakeWaveform();
  drawWaveform(0);
}

function togglePlay() {
  audio.paused ? audio.play().catch(() => {}) : audio.pause();
}

btnPlay.addEventListener('click', togglePlay);
rowPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
singleTrackRow.addEventListener('click', togglePlay);

audio.addEventListener('play', () => {
  iconPlay.style.display = 'none';
  iconPause.style.display = '';
  rowPlayBtn.classList.add('playing');
});
audio.addEventListener('pause', () => {
  iconPlay.style.display = '';
  iconPause.style.display = 'none';
  rowPlayBtn.classList.remove('playing');
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = audio.currentTime / audio.duration;
  scrubber.value = pct * 100;
  timeCurrent.textContent = fmt(audio.currentTime);
  drawWaveform(pct);
});
audio.addEventListener('loadedmetadata', () => { timeTotal.textContent = fmt(audio.duration); });

scrubber.addEventListener('input', () => {
  const pct = scrubber.value / 100;
  if (audio.duration) audio.currentTime = pct * audio.duration;
  drawWaveform(pct);
});

canvas.addEventListener('click', (e) => {
  const pct = (e.clientX - canvas.getBoundingClientRect().left) / canvas.offsetWidth;
  if (audio.duration) audio.currentTime = pct * audio.duration;
  drawWaveform(pct);
});

function loadWaveformFromSrc(src) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  fetch(src).then(r => r.arrayBuffer()).then(b => audioCtx.decodeAudioData(b))
    .then(d => { waveformData = extract(d); drawWaveform(0); })
    .catch(() => { waveformData = fakeWaveform(); drawWaveform(0); });
}

function extract(decoded) {
  const raw = decoded.getChannelData(0);
  const bars = 120, step = Math.floor(raw.length / bars);
  const data = [];
  for (let i = 0; i < bars; i++) {
    let s = 0;
    for (let j = 0; j < step; j++) s += Math.abs(raw[i * step + j]);
    data.push(s / step);
  }
  const mx = Math.max(...data);
  return data.map(v => v / mx);
}

function fakeWaveform() {
  const data = [];
  for (let i = 0; i < 120; i++) {
    const x = i / 120;
    data.push(Math.max(0.05, Math.min(1, Math.sin(x * Math.PI * 3) * 0.3 + 0.5 + (Math.random() - 0.5) * 0.5)));
  }
  return data;
}

function drawWaveform(progress) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx2d.scale(dpr, dpr);
  ctx2d.clearRect(0, 0, W, H);
  if (!waveformData) return;
  const bars = waveformData.length, barW = W / bars, gap = 1.5;
  waveformData.forEach((v, i) => {
    const x = i * barW, barH = v * (H - 8), y = (H - barH) / 2;
    const played = (i / bars) <= progress;
    ctx2d.fillStyle = played ? '#c8a96e' : '#2a1e1e';
    ctx2d.fillRect(x + gap / 2, y, barW - gap, barH);
    if (played) { ctx2d.fillStyle = 'rgba(200,169,110,0.5)'; ctx2d.fillRect(x + gap / 2, y, barW - gap, 2); }
  });
  if (progress > 0 && progress < 1) {
    ctx2d.fillStyle = '#e8ddd0';
    ctx2d.fillRect(progress * W - 0.5, 0, 1.5, H);
  }
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
}

window.addEventListener('resize', () => drawWaveform(audio.duration ? audio.currentTime / audio.duration : 0));
</script>
</body>
</html>
