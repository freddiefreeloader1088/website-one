  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0a0a;
      --bg2: #160d0d;
      --accent: #c8a96e;
      --accent2: #7ecac8;
      --text: #e8ddd0;
      --muted: #6b5a52;
      --border: #2a1e1e;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 4rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(14,10,10,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.1rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); }

    /* ── HERO ── */
    .hero {
      padding: 5rem 4rem 3rem;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-label {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 0.75rem;
      display: block;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 6vw, 5.5rem);
      line-height: 0.95;
      color: var(--text);
      font-weight: 700;
    }

    .hero-name em {
      font-style: italic;
      color: var(--accent);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 3.5rem 4rem 1.8rem;
      border-top: 1px solid var(--border);
    }

    /* ── POETRY GRID ── */
    .poetry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      padding: 0 4rem 6rem;
      animation: fadeUp 0.9s 0.12s ease both;
    }

    /* ── POEM CARD (portrait) ── */
    .poem-card {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      /* enforce portrait */
      aspect-ratio: 2 / 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .poem-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    /* Abstract background for each card */
    .card-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .card-bg svg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Text overlay gradient */
    .card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(14,10,10,0.3) 35%,
        rgba(14,10,10,0.85) 65%,
        rgba(14,10,10,0.97) 100%
      );
    }

    /* Hover reveal: show first lines */
    .card-preview {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .poem-card:hover .card-preview { opacity: 1; }

    .preview-lines {
      font-family: 'EB Garamond', serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--text);
      opacity: 0.65;
      line-height: 1.8;
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* Card footer */
    .card-footer {
      position: relative;
      z-index: 2;
      padding: 1.8rem 1.6rem 1.6rem;
    }

    .card-number {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 0.45rem;
    }

    .card-author {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent2);
    }

    .card-read {
      display: inline-block;
      margin-top: 0.9rem;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .poem-card:hover .card-read {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── SCROLL READER OVERLAY ── */
    .reader-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: stretch;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .reader-overlay.open {
      pointer-events: auto;
      opacity: 1;
    }

    .reader-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(8, 5, 5, 0.88);
      backdrop-filter: blur(18px);
    }

    /* Scroll container */
    .reader-scroll {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      padding: 6rem 2rem 8rem;
      scroll-behavior: smooth;

      /* Custom scrollbar */
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .reader-scroll::-webkit-scrollbar { width: 3px; }
    .reader-scroll::-webkit-scrollbar-track { background: transparent; }
    .reader-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* The actual poem column */
    .reader-column {
      width: 100%;
      max-width: 560px;
      transform: translateY(30px);
      opacity: 0;
      transition: transform 0.6s 0.15s cubic-bezier(0.25,0.46,0.45,0.94),
                  opacity 0.6s 0.15s ease;
    }

    .reader-overlay.open .reader-column {
      transform: translateY(0);
      opacity: 1;
    }

    .reader-meta {
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .reader-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.08;
      margin-bottom: 0.4rem;
    }

    .reader-author {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 3rem;
    }

    .reader-divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
      margin-bottom: 3rem;
    }

    /* Poem body */
    .reader-body {
      font-family: 'EB Garamond', serif;
      font-size: 1.2rem;
      line-height: 2;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .reader-body p {
      margin-bottom: 0;
      white-space: pre-wrap;
    }

    .reader-body .stanza {
      margin-bottom: 2.2rem;
    }

    /* Closing ornament */
    .reader-end {
      margin-top: 4rem;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.4;
      text-align: center;
    }

    /* Close button */
    .reader-close {
      position: fixed;
      top: 2rem;
      right: 2.5rem;
      z-index: 600;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s 0.2s ease, border-color 0.2s, color 0.2s;
    }

    .reader-overlay.open .reader-close {
      opacity: 1;
      pointer-events: auto;
    }

    .reader-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Progress line */
    .reader-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 1px;
      background: var(--accent);
      width: 0%;
      z-index: 700;
      transition: width 0.05s linear;
      opacity: 0;
    }

    .reader-overlay.open .reader-progress {
      opacity: 0.6;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
  </style>
</head>

      "Let us go then, you and I,\nWhen the evening is spread out against the sky\nLike a patient etherized upon a table;\nLet us go, through certain half-deserted streets,\nThe muttering retreats\nOf restless nights in one-night cheap hotels\nAnd sawdust restaurants with oyster-shells:",
      "Streets that follow like a tedious argument\nOf insidious intent\nTo lead you to an overwhelming question...\nOh, do not ask, \"What is it?\"\nLet us go and make our visit.",
      "In the room the women come and go\nTalking of Michelangelo.",
      "The yellow fog that rubs its back upon the window-panes,\nThe yellow smoke that rubs its muzzle on the window-panes\nLicked its tongue into the corners of the evening,\nLingered upon the pools that stand in drains,\nLet fall upon its back the soot that falls from chimneys,\nSlipped by the terrace, made a sudden leap,\nAnd seeing that it was a soft October night,\nCurled once about the house, and fell asleep.",
      "And indeed there will be time\nFor the yellow smoke that slides along the street,\nRubbing its back upon the window-panes;\nThere will be time, there will be time\nTo prepare a face to meet the faces that you meet;",
      "There will be time to murder and create,\nAnd time for all the works and days of hands\nThat lift and drop a question on your plate;\nTime for you and time for me,\nAnd time yet for a hundred indecisions,\nAnd for a hundred visions and revisions,\nBefore the taking of a toast and tea.",
      "Do I dare\nDisturb the universe?\nIn a minute there is time\nFor decisions and revisions which a minute will reverse."
    ]
  }
];

/* ──────────────────────────────
   CARD BACKGROUND GENERATORS
────────────────────────────── */
function makeBg(p, idx) {
  const [c1, c2, accent] = p.palette;
  const scenes = [
    // 0 — radial glow + lines
    `<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="450" fill="${c1}"/>
      <defs><radialGradient id="rg${idx}" cx="50%" cy="60%" r="55%">
        <stop offset="0%" stop-color="${accent}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${c1}" stop-opacity="0"/>
      </radialGradient></defs>
      <rect width="300" height="450" fill="url(#rg${idx})"/>
      <line x1="0" y1="225" x2="300" y2="225" stroke="${accent}" stroke-width="0.4" opacity="0.12"/>
      <line x1="150" y1="0" x2="150" y2="450" stroke="${accent}" stroke-width="0.3" opacity="0.08"/>
      <circle cx="150" cy="225" r="80" fill="none" stroke="${accent}" stroke-width="0.5" opacity="0.1"/>
      <circle cx="150" cy="225" r="140" fill="none" stroke="${accent}" stroke-width="0.3" opacity="0.06"/>
    </svg>`,
    // 1 — diagonal bars
    `<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="450" fill="${c1}"/>
      <defs><linearGradient id="lg${idx}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${c2}"/>
        <stop offset="100%" stop-color="${c1}"/>
      </linearGradient></defs>
      <rect width="300" height="450" fill="url(#lg${idx})" opacity="0.6"/>
      <line x1="-50" y1="150" x2="350" y2="550" stroke="${accent}" stroke-width="0.5" opacity="0.1"/>
      <line x1="-50" y1="80" x2="350" y2="480" stroke="${accent}" stroke-width="0.3" opacity="0.07"/>
      <line x1="-50" y1="220" x2="350" y2="620" stroke="${accent}" stroke-width="0.4" opacity="0.09"/>
    </svg>`,
    // 2 — dots grid
    `<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="450" fill="${c1}"/>
      <defs><radialGradient id="dg${idx}" cx="30%" cy="40%" r="60%">
        <stop offset="0%" stop-color="${accent}" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="${c1}" stop-opacity="0"/>
      </radialGradient></defs>
      <rect width="300" height="450" fill="url(#dg${idx})"/>
      ${Array.from({length:6}, (_,r) => Array.from({length:4}, (_,c2) =>
        `<circle cx="${40+c2*75}" cy="${60+r*70}" r="1.2" fill="${accent}" opacity="0.12"/>`
      ).join('')).join('')}
    </svg>`,
  ];
  return scenes[idx % scenes.length];
}

/* ──────────────────────────────
   BUILD GRID
────────────────────────────── */
const grid = document.getElementById('poetryGrid');

poems.forEach((poem, i) => {
  const card = document.createElement('div');
  card.className = 'poem-card';
  card.innerHTML = `
    <div class="card-bg">${makeBg(poem, i)}</div>
    <div class="card-gradient"></div>
    <div class="card-preview">
      <div class="preview-lines">${poem.preview}</div>
    </div>
    <div class="card-footer">
      <div class="card-number">${String(i+1).padStart(2,'0')}</div>
      <div class="card-title">${poem.title}</div>
      <div class="card-author">${poem.author} · ${poem.year}</div>
      <span class="card-read">Read poem →</span>
    </div>
  `;
  card.addEventListener('click', () => openReader(i));
  grid.appendChild(card);
});

/* ──────────────────────────────
   READER
────────────────────────────── */
const overlay   = document.getElementById('readerOverlay');
const column    = document.getElementById('readerColumn');
const scroll    = document.getElementById('readerScroll');
const progress  = document.getElementById('readerProgress');

function openReader(idx) {
  const poem = poems[idx];
  column.innerHTML = `
    <div class="reader-meta">${String(idx+1).padStart(2,'0')} / ${String(poems.length).padStart(2,'0')} · ${poem.year}</div>
    <h1 class="reader-title">${poem.title}</h1>
    <div class="reader-author">${poem.author}</div>
    <div class="reader-divider"></div>
    <div class="reader-body">
      ${poem.stanzas.map(s => `<div class="stanza"><p>${s}</p></div>`).join('')}
    </div>
    <div class="reader-end">— ✦ —</div>
  `;
  scroll.scrollTop = 0;
  progress.style.width = '0%';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeReader() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// Close on backdrop
document.getElementById('readerBackdrop').addEventListener('click', closeReader);

// Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeReader();
});

// Read progress bar
scroll.addEventListener('scroll', () => {
  const max = scroll.scrollHeight - scroll.clientHeight;
  const pct = max > 0 ? (scroll.scrollTop / max) * 100 : 0;
  progress.style.width = pct + '%';
});
</script>
