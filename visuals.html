<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visuals — Freddie Freeloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0e0a0a;--bg2:#130c0c;
      --accent:#c8a96e;--accent2:#7ecac8;
      --text:#e8ddd0;--muted:#6b5a52;--border:#261818;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.03;pointer-events:none;z-index:9999}

    nav{display:flex;justify-content:space-between;align-items:center;padding:2rem 4rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(14,10,10,.93);backdrop-filter:blur(14px);z-index:200}
    .nav-logo{font-family:'Playfair Display',serif;font-size:2.1rem;letter-spacing:.12em;color:var(--accent);text-decoration:none}
    .nav-links{display:flex;gap:2.5rem;list-style:none}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--accent)}

    .hero{padding:5rem 4rem 2.5rem;animation:fadeUp .8s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    .hero-label{font-size:.65rem;letter-spacing:.32em;text-transform:uppercase;color:var(--accent2);display:block;margin-bottom:.6rem}
    .hero-name{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,5.5vw,5rem);line-height:.95;font-weight:700}
    .hero-name em{font-style:italic;color:var(--accent)}

    .section-block{margin-bottom:5rem}
    .section-head{display:flex;align-items:baseline;justify-content:space-between;padding:3rem 4rem 1.4rem;border-top:1px solid var(--border)}
    .section-title{font-size:.62rem;letter-spacing:.38em;text-transform:uppercase;color:var(--muted)}
    .section-meta{font-size:.58rem;letter-spacing:.18em;color:var(--border)}

    .zine-grid,.poster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;padding:0 4rem}
    .graphics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;padding:0 4rem;grid-auto-rows:8px}

    .vcard{position:relative;background:var(--bg2);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .35s,box-shadow .35s}
    .vcard:hover{border-color:rgba(200,169,110,.4);box-shadow:0 6px 32px rgba(0,0,0,.55)}
    .zine-card,.poster-card{aspect-ratio:2/3}

    .card-art{width:100%;height:100%;overflow:hidden;position:relative}
    .card-art svg{width:100%;height:100%;display:block;transition:transform .6s cubic-bezier(.25,.46,.45,.94)}
    .vcard:hover .card-art svg{transform:scale(1.025)}
    .card-art img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.25,.46,.45,.94);filter:grayscale(10%)}
    .vcard:hover .card-art img{transform:scale(1.025)}

    .card-veil{position:absolute;inset:0;background:rgba(6,4,4,0);transition:background .32s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.45rem;z-index:2}
    .vcard:hover .card-veil{background:rgba(6,4,4,.78)}
    .veil-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--text);text-align:center;padding:0 .9rem;line-height:1.2;opacity:0;transform:translateY(7px);transition:opacity .28s .04s,transform .28s .04s}
    .veil-sub{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);opacity:0;transform:translateY(5px);transition:opacity .28s .08s,transform .28s .08s}
    .veil-acts{display:flex;gap:.45rem;margin-top:.35rem;opacity:0;transform:translateY(5px);transition:opacity .28s .12s,transform .28s .12s}
    .vcard:hover .veil-title,.vcard:hover .veil-sub,.vcard:hover .veil-acts{opacity:1;transform:translateY(0)}
    .vbtn{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.16em;text-transform:uppercase;padding:.32rem .65rem;border:1px solid;background:none;cursor:pointer;transition:background .18s,color .18s}
    .vbtn.open{border-color:var(--accent);color:var(--accent)}
    .vbtn.open:hover{background:var(--accent);color:var(--bg)}
    .vbtn.dl{border-color:var(--muted);color:var(--muted)}
    .vbtn.dl:hover{border-color:var(--text);color:var(--text)}

    .card-foot{padding:.6rem .8rem .55rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .cf-title{font-family:'Playfair Display',serif;font-size:.72rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px}
    .cf-year{font-size:.5rem;letter-spacing:.14em;color:var(--muted);margin-top:.1rem}
    .cf-dl{background:none;border:none;color:var(--muted);font-size:.58rem;cursor:pointer;padding:.15rem .25rem;transition:color .18s;font-family:'DM Mono',monospace}
    .cf-dl:hover{color:var(--accent)}

    /* ═══ PDF READER OVERLAY ═══ */
    #readerOverlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease}
    #readerOverlay.open{opacity:1;pointer-events:auto}
    #readerBackdrop{position:absolute;inset:0;background:rgba(4,2,2,.97);backdrop-filter:blur(32px)}

    /* Top bar */
    .reader-bar{position:relative;z-index:10;width:100%;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
    .reader-bar-left{display:flex;flex-direction:column;gap:.2rem}
    .reader-bar-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--text);letter-spacing:.04em}
    .reader-bar-sub{font-size:.52rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}
    .reader-bar-right{display:flex;align-items:center;gap:1.2rem}
    .reader-close{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;padding:.38rem .75rem;cursor:pointer;transition:border-color .2s,color .2s}
    .reader-close:hover{border-color:var(--accent);color:var(--accent)}
    .reader-stage{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:2rem 4rem;overflow:hidden}
    #bookWrap{position:relative;display:flex;align-items:stretch;filter:drop-shadow(0 30px 60px rgba(0,0,0,.8))}
    .pdf-panel{position:relative;overflow:hidden;background:#f0e8d8}
    #panelL{border-radius:3px 0 0 3px}
    #panelR{border-radius:0 3px 3px 0}
    #bookSpine{width:7px;background:linear-gradient(to right,rgba(0,0,0,.35) 0%,rgba(255,255,255,.04) 50%,rgba(0,0,0,.3) 100%);flex-shrink:0;z-index:5}
    #panelL::after{content:'';position:absolute;top:0;right:0;width:28px;height:100%;background:linear-gradient(to left,rgba(0,0,0,.18),transparent);pointer-events:none;z-index:3}
    #panelR::before{content:'';position:absolute;top:0;left:0;width:28px;height:100%;background:linear-gradient(to right,rgba(0,0,0,.22),transparent);pointer-events:none;z-index:3}
    .pdf-panel canvas{display:block}
    #bookWrap.cover-mode #panelL{display:none}
    #bookWrap.cover-mode #bookSpine{display:none}
    #bookWrap.cover-mode #panelR{border-radius:3px}
    .pdf-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;background:#f0e8d8;z-index:10}
    .pdf-loading-text{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:#6b5a52}
    .pdf-spinner{width:18px;height:18px;border:1.5px solid rgba(107,90,82,.2);border-top-color:#c8a96e;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .reader-controls{position:relative;z-index:10;width:100%;display:flex;align-items:center;justify-content:center;gap:2rem;padding:.9rem 2.5rem;border-top:1px solid var(--border);flex-shrink:0}
    .r-nav{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s,color .2s,opacity .2s;flex-shrink:0}
    .r-nav:hover{border-color:var(--accent);color:var(--accent)}
    .r-nav:disabled{opacity:.2;pointer-events:none}
    .r-nav svg{width:10px;height:10px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .r-indicator{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);min-width:120px;text-align:center}
    .r-indicator em{color:var(--accent);font-style:normal}
    .r-hint{font-size:.46rem;letter-spacing:.14em;text-transform:uppercase;color:var(--border);position:absolute;right:2.5rem}
    @keyframes flipOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-10px)}}
    @keyframes flipIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
    .flip-out{animation:flipOut .15s ease forwards}
    .flip-in{animation:flipIn .2s ease forwards}

    footer{border-top:1px solid var(--border);padding:2rem 4rem;display:flex;justify-content:space-between;font-size:.62rem;letter-spacing:.15em;color:var(--muted)}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">FФ.</a>
  <ul class="nav-links">
    <li><a href="poetry.html">Poetry</a></li>
    <li><a href="visuals.html" class="active">Visuals</a></li>
    <li><a href="photography.html">Photography</a></li>
    <li><a href="#">Contact</a></li>
    <li><a href="#">About</a></li>
  </ul>
</nav>

<div class="hero">
  <span class="hero-label">Visual World</span>
  <h1 class="hero-name">Vi<em>suals</em></h1>
</div>

<div class="section-block">
  <div class="section-head"><span class="section-title">Zines</span><span class="section-meta" id="zineCount"></span></div>
  <div class="zine-grid" id="zineGrid"></div>
</div>
<div class="section-block">
  <div class="section-head"><span class="section-title">Graphics</span><span class="section-meta" id="gfxCount"></span></div>
  <div class="graphics-grid" id="gfxGrid"></div>
</div>
<div class="section-block">
  <div class="section-head"><span class="section-title">Posters</span><span class="section-meta" id="postCount"></span></div>
  <div class="poster-grid" id="postGrid"></div>
</div>

<footer><span>© 2024 Freddie Freeloader</span><span>Visuals</span></footer>

<!-- PDF READER OVERLAY -->
<div id="readerOverlay">
  <div id="readerBackdrop"></div>

  <div class="reader-bar">
    <div class="reader-bar-left">
      <div class="reader-bar-title" id="readerTitle">—</div>
      <div class="reader-bar-sub" id="readerSub">—</div>
    </div>
    <div class="reader-bar-right">
      <button class="reader-close" onclick="closeReader()">Close ✕</button>
    </div>
  </div>

  <div class="reader-stage">
    <div id="bookWrap" class="cover-mode">
      <div class="pdf-panel" id="panelL">
        <div class="pdf-loading" id="loadL"><div class="pdf-spinner"></div><div class="pdf-loading-text">Loading</div></div>
      </div>
      <div id="bookSpine"></div>
      <div class="pdf-panel" id="panelR">
        <div class="pdf-loading" id="loadR"><div class="pdf-spinner"></div><div class="pdf-loading-text">Loading</div></div>
      </div>
    </div>
  </div>

  <div class="reader-controls">
    <button class="r-nav" id="rPrev" disabled onclick="readerTurn(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="r-indicator" id="rIndicator"><em>Cover</em></div>
    <button class="r-nav" id="rNext" onclick="readerTurn(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <span class="r-hint">← → to turn pages · esc to close</span>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════
   UTILITY
════════════════════════════════════════════════ */
const R=(min,max)=>min+Math.random()*(max-min);
const uid=()=>Math.random().toString(36).slice(2,6);
function wrap(inner,W,H){return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">${inner}</svg>`;}
function dlSvg(svgStr, name){
  const b=new Blob([svgStr],{type:'image/svg+xml'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download=name+'.svg';a.click();URL.revokeObjectURL(u);
}

/* ════════════════════════════════════════════════
   POSTER ART GENERATORS  (W×H, dark background)
════════════════════════════════════════════════ */
function pArt_city(W,H,bg,fg,ac){
  const id=uid();
  const bldgs=Array.from({length:14},(_,i)=>{
    const bw=W*(R(.055,.1));const bx=W*(i/14)+R(-4,4);
    const bh=H*(R(.15,.42));const by=H*.53-bh;
    const wins=Array.from({length:Math.floor(R(2,6))},(_,j)=>{
      const wx=bx+R(3,bw-6),wy=by+R(4,bh*.8);
      return `<rect x="${wx}" y="${wy}" width="2.2" height="3.2" fill="${ac}" opacity="${R(.12,.28)}"/>`;
    }).join('');
    return `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="${bg}"/>${wins}`;
  }).join('');
  return `
  <defs><radialGradient id="cg${id}" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="${ac}" stop-opacity=".22"/><stop offset="100%" stop-color="${bg}" stop-opacity="0"/></radialGradient></defs>
  <rect width="${W}" height="${H}" fill="${bg}"/>
  <rect width="${W}" height="${H}" fill="url(#cg${id})"/>
  ${bldgs}
  <rect x="0" y="${H*.53}" width="${W}" height="${H*.47}" fill="${bg}" opacity=".88"/>
  <line x1="0" y1="${H*.53}" x2="${W}" y2="${H*.53}" stroke="${fg}" stroke-width=".5" opacity=".1"/>
  <circle cx="${W*.76}" cy="${H*.16}" r="${W*.04}" fill="${fg}" opacity=".06"/>
  <circle cx="${W*.76}" cy="${H*.16}" r="${W*.028}" fill="${fg}" opacity=".06"/>
  <circle cx="${W*.783}" cy="${H*.153}" r="${W*.028}" fill="${bg}"/>
  <text x="${W*.5}" y="${H*.67}" text-anchor="middle" fill="${fg}" font-family="'Playfair Display',Georgia,serif" font-size="${W*.11}" font-weight="700">NIGHT</text>
  <text x="${W*.5}" y="${H*.79}" text-anchor="middle" fill="${ac}" font-family="'Playfair Display',Georgia,serif" font-size="${W*.075}" font-style="italic">Architecture</text>
  <line x1="${W*.15}" y1="${H*.83}" x2="${W*.85}" y2="${H*.83}" stroke="${ac}" stroke-width=".5" opacity=".3"/>
  <text x="${W*.5}" y="${H*.91}" text-anchor="middle" fill="${fg}" font-family="monospace" font-size="${W*.034}" letter-spacing="3" opacity=".2">FREDDIE FREELOADER · 2023</text>`;
}

function pArt_freq(W,H,bg,fg,ac){
  const id=uid();
  const bars=Array.from({length:48},(_,i)=>{
    const x=W*.06+i*(W*.88/48);
    const amp=(Math.sin(i*.55)*Math.cos(i*.27)+1)*.5;
    const h=amp*H*.28+H*.03;
    return `<rect x="${x}" y="${H*.52-h/2}" width="${W*.88/48-.6}" height="${h}" fill="${ac}" opacity="${.1+amp*.1}"/>`;
  }).join('');
  return `
  <defs><linearGradient id="fg${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${bg}"/><stop offset="100%" stop-color="${ac}" stop-opacity=".1"/></linearGradient></defs>
  <rect width="${W}" height="${H}" fill="${bg}"/>
  <rect width="${W}" height="${H}" fill="url(#fg${id})"/>
  ${Array.from({length:Math.floor(H/4)},(_,i)=>`<line x1="0" y1="${i*4}" x2="${W}" y2="${i*4}" stroke="${fg}" stroke-width=".2" opacity=".04"/>`).join('')}
  ${bars}
  <line x1="${W*.06}" y1="${H*.52}" x2="${W*.94}" y2="${H*.52}" stroke="${ac}" stroke-width=".5" opacity=".22"/>
  <circle cx="${W*.5}" cy="${H*.52}" r="${W*.28}" fill="none" stroke="${ac}" stroke-width=".4" opacity=".07"/>
  <circle cx="${W*.5}" cy="${H*.52}" r="${W*.16}" fill="none" stroke="${ac}" stroke-width=".35" opacity=".09"/>
  <ellipse cx="${W*.5}" cy="${H*.52}" rx="${W*.22}" ry="${H*.06}" fill="${ac}" opacity=".03"/>
  <text x="${W*.5}" y="${H*.76}" text-anchor="middle" fill="${fg}" font-family="'Playfair Display',serif" font-size="${W*.09}" font-style="italic">Frequency</text>
  <text x="${W*.5}" y="${H*.85}" text-anchor="middle" fill="${ac}" font-family="monospace" font-size="${W*.042}" letter-spacing="5" opacity=".5">MAP · 2024</text>
  <text x="${W*.5}" y="${H*.93}" text-anchor="middle" fill="${fg}" font-family="monospace" font-size="${W*.032}" letter-spacing="3" opacity=".18">FREDDIE FREELOADER</text>`;
}

function pArt_ceremony(W,H,bg,fg,ac){
  const rings=Array.from({length:7},(_,i)=>`<circle cx="${W*.5}" cy="${H*.4}" r="${W*(.07+i*.09)}" fill="none" stroke="${ac}" stroke-width="${.55-i*.04}" opacity="${.2-i*.022}"/>`).join('');
  const spokes=Array.from({length:12},(_,i)=>{const a=(i/12)*Math.PI*2;const r1=W*.07,r2=W*.63;return `<line x1="${W*.5+Math.cos(a)*r1}" y1="${H*.4+Math.sin(a)*r1}" x2="${W*.5+Math.cos(a)*r2}" y2="${H*.4+Math.sin(a)*r2}" stroke="${fg}" stroke-width=".28" opacity=".07"/>`;}).join('');
  const corners=[[W*.09,H*.09,W*.19,H*.09,W*.09,H*.09,W*.09,H*.18],[W*.91,H*.09,W*.81,H*.09,W*.91,H*.09,W*.91,H*.18],[W*.09,H*.91,W*.19,H*.91,W*.09,H*.91,W*.09,H*.82],[W*.91,H*.91,W*.81,H*.91,W*.91,H*.91,W*.91,H*.82]].map(([x1,y1,x2,y2,x3,y3,x4,y4])=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${ac}" stroke-width=".5" opacity=".28"/><line x1="${x3}" y1="${y3}" x2="${x4}" y2="${y4}" stroke="${ac}" stroke-width=".5" opacity=".28"/>`).join('');
  return `
  <rect width="${W}" height="${H}" fill="${bg}"/>
  ${corners}${rings}${spokes}
  <circle cx="${W*.5}" cy="${H*.4}" r="${W*.032}" fill="${ac}" opacity=".25"/>
  <circle cx="${W*.5}" cy="${H*.4}" r="${W*.016}" fill="${ac}" opacity=".45"/>
  <text x="${W*.5}" y="${H*.73}" text-anchor="middle" fill="${fg}" font-family="'Playfair Display',serif" font-size="${W*.09}" font-weight="700" letter-spacing="2">The</text>
  <text x="${W*.5}" y="${H*.84}" text-anchor="middle" fill="${fg}" font-family="'Playfair Display',serif" font-size="${W*.09}" font-weight="700" font-style="italic">Ceremony</text>
  <text x="${W*.5}" y="${H*.93}" text-anchor="middle" fill="${ac}" font-family="monospace" font-size="${W*.034}" letter-spacing="4" opacity=".45">2023 · FF</text>`;
}

function pArt_dissolve(W,H,bg,fg,ac){
  const stripes=Array.from({length:64},(_,i)=>{const y=i*(H/63);const op=Math.max(0,(Math.sin(i*.38+1)*.5+.5)*.2);return `<rect x="0" y="${y}" width="${W}" height="${H/63+.3}" fill="${fg}" opacity="${op}"/>`;}).join('');
  return `
  <rect width="${W}" height="${H}" fill="${bg}"/>
  ${stripes}
  <line x1="${W*.5}" y1="${H*.07}" x2="${W*.5}" y2="${H*.88}" stroke="${ac}" stroke-width=".45" opacity=".18"/>
  <text x="${W*.5}" y="${H*.44}" text-anchor="middle" fill="${fg}" font-family="'Playfair Display',serif" font-size="${W*.115}" font-weight="700" letter-spacing="2">SLOW</text>
  <text x="${W*.5}" y="${H*.58}" text-anchor="middle" fill="${fg}" font-family="'Playfair Display',serif" font-size="${W*.1}" font-weight="700" font-style="italic" opacity=".55">Dissolve</text>
  <line x1="${W*.18}" y1="${H*.64}" x2="${W*.82}" y2="${H*.64}" stroke="${ac}" stroke-width=".5" opacity=".28"/>
  <text x="${W*.5}" y="${H*.93}" text-anchor="middle" fill="${fg}" font-family="monospace" font-size="${W*.033}" letter-spacing="3" opacity=".18">FREDDIE FREELOADER</text>`;
}

function pArt_ground(W,H,bg,fg,ac){
  const stars=Array.from({length:24},(_,i)=>`<circle cx="${W*R(.04,.96)}" cy="${H*R(.04,.44)}" r="${R(.6,1.5)}" fill="${fg}" opacity="${R(.08,.18)}"/>`).join('');
  const bldg2=Array.from({length:6},(_,i)=>{const bw=W*R(.04,.07);const bx=W*(i/6)+R(0,W/7-bw);const bh=H*R(.03,.1);return `<rect x="${bx}" y="${H*.47-bh}" width="${bw}" height="${bh}" fill="${bg}" opacity=".7"/>`;}).join('');
  return `
  <rect width="${W}" height="${H}" fill="${bg}"/>
  ${stars}${bldg2}
  <rect x="0" y="${H*.47}" width="${W}" height=".7" fill="${fg}" opacity=".16"/>
  ${Array.from({length:6},(_,i)=>`<line x1="0" y1="${H*(.5+i*.06)}" x2="${W}" y2="${H*(.5+i*.06)}" stroke="${fg}" stroke-width="${.28-i*.02}" opacity="${.07-i*.008}"/>`).join('')}

function gArt_grid(W,H,bg,fg,ac){

/* ════════════════════════════════════════════════
   PDF READER ENGINE  (PDF.js)
════════════════════════════════════════════════ */
let pdfDoc=null, rSpread=0, rTotal=0, rRendering=false, activeZineIdx=null;

const PAGE_H=Math.min(window.innerHeight*0.72, 620);
const PAGE_W=Math.round(PAGE_H*0.707); // A4 ratio

// Size panels
(function sizePanels(){
  const pL=document.getElementById('panelL');
  const pR=document.getElementById('panelR');
  [pL,pR].forEach(p=>{p.style.width=PAGE_W+'px';p.style.height=PAGE_H+'px';});
})();

function openReader(i){
  activeZineIdx=i;
  const z=ZINES[i];
  document.getElementById('readerTitle').textContent=z.title;
  document.getElementById('readerSub').textContent=z.sub;
  document.getElementById('readerOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  rSpread=0;
  setBookMode(0);
  if(!pdfDoc){
    loadPDF(z.pdf);
  } else {
    renderSpread(0);
  }
}

function closeReader(){
  document.getElementById('readerOverlay').classList.remove('open');
  document.body.style.overflow='';
}

function loadPDF(src){
  showLoading(true,true);
  pdfjsLib.getDocument(src).promise.then(doc=>{
    pdfDoc=doc;
    rTotal=doc.numPages;
    renderSpread(0);
  }).catch(err=>{
    console.error('PDF load error:',err);
    showError();
  });
}

function showLoading(left,right){
  const lL=document.getElementById('loadL');
  const lR=document.getElementById('loadR');
  if(lL) lL.style.display=left?'flex':'none';
  if(lR) lR.style.display=right?'flex':'none';
}

function showError(){
  const pR=document.getElementById('panelR');
  const lR=document.getElementById('loadR');
  if(lR){ lR.innerHTML='<div class="pdf-loading-text" style="color:#c8a96e">Could not load PDF</div>'; lR.style.display='flex'; }
}

async function renderSpread(spread){
  if(rRendering)return;
  rRendering=true;
  rSpread=spread;

  const isCover=(spread===0);
  setBookMode(isCover?0:1);

  if(isCover){
    // Single page: page 1 on right
    showLoading(false,true);
    await renderPageToPanel('panelR','loadR',1);
  } else {
    // Spread: left = odd page, right = even page (2-page spread)
    const lPage=spread*2;   // e.g. spread 1 → pages 2,3
    const rPage=spread*2+1;
    showLoading(lPage<=rTotal,rPage<=rTotal);
    const tasks=[];
    if(lPage<=rTotal) tasks.push(renderPageToPanel('panelL','loadL',lPage));
    else clearPanel('panelL');
    if(rPage<=rTotal) tasks.push(renderPageToPanel('panelR','loadR',rPage));
    else clearPanel('panelR');
    await Promise.all(tasks);
  }

  updateControls();
  rRendering=false;
}

async function renderPageToPanel(panelId,loadId,pageNum){
  const panel=document.getElementById(panelId);
  const loader=document.getElementById(loadId);
  try{
    const page=await pdfDoc.getPage(pageNum);
    const scale=PAGE_H/page.getViewport({scale:1}).height;
    const viewport=page.getViewport({scale});
    const canvas=document.createElement('canvas');
    canvas.width=Math.round(viewport.width);
    canvas.height=Math.round(viewport.height);
    canvas.style.width=canvas.width+'px';
    canvas.style.height=canvas.height+'px';
    await page.render({canvasContext:canvas.getContext('2d'),viewport}).promise;
    // Swap in with flip animation
    const old=panel.querySelector('canvas');
    if(old){ old.classList.add('flip-out'); setTimeout(()=>old.remove(),160); }
    canvas.classList.add('flip-in');
    panel.appendChild(canvas);
    // Update panel width to match rendered page
    panel.style.width=canvas.width+'px';
    if(loader) loader.style.display='none';
  } catch(e){ console.error('render error page',pageNum,e); }
}

function clearPanel(panelId){
  const panel=document.getElementById(panelId);
  const old=panel.querySelector('canvas');
  if(old) old.remove();
  const l=panel.querySelector('.pdf-loading');
  if(l) l.style.display='none';
}

function setBookMode(mode){ // 0=cover(single), 1=spread(double)
  const bw=document.getElementById('bookWrap');
  if(mode===0) bw.classList.add('cover-mode');
  else bw.classList.remove('cover-mode');
}

function updateControls(){
  const prev=document.getElementById('rPrev');
  const next=document.getElementById('rNext');
  const ind=document.getElementById('rIndicator');
  const maxSpread=Math.ceil((rTotal-1)/2);

  prev.disabled=(rSpread===0);
  next.disabled=(rSpread>=maxSpread);

  if(rSpread===0){
    ind.innerHTML='<em>Cover</em>';
  } else {
    const lPage=rSpread*2, rPage=rSpread*2+1;
    const pageStr=rPage<=rTotal?`${lPage} — ${rPage}`:`${lPage}`;
    ind.innerHTML=`<em>${pageStr}</em> <span style="opacity:.4">/ ${rTotal}</span>`;
  }
}

function readerTurn(dir){
  if(rRendering)return;
  const maxSpread=Math.ceil((rTotal-1)/2);
  const ns=rSpread+dir;
  if(ns<0||ns>maxSpread)return;
  renderSpread(ns);
}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('readerOverlay').classList.contains('open'))return;
  if(e.key==='ArrowRight')readerTurn(1);
  if(e.key==='ArrowLeft')readerTurn(-1);
  if(e.key==='Escape')closeReader();
});
