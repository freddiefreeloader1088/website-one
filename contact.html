    .nav-logo{font-family:'Playfair Display',serif;font-size:2.1rem;letter-spacing:.12em;color:var(--accent);text-decoration:none}
    .nav-links{display:flex;gap:2.5rem;list-style:none}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--accent)}

    /* PAGE LAYOUT */
    .page-wrap{min-height:calc(100vh - 81px);display:flex;flex-direction:column;justify-content:center;padding:5rem 4rem 6rem;animation:fadeUp .7s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .page-label{font-size:.62rem;letter-spacing:.35em;text-transform:uppercase;color:var(--accent2);display:block;margin-bottom:.7rem}
    .page-title{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,4.5vw,4rem);line-height:.95;font-weight:700;margin-bottom:3.5rem}
    .page-title em{font-style:italic;color:var(--accent)}

    /* CONTACT TABLE */
    .contact-table{width:100%;max-width:680px;border-collapse:collapse}

    .contact-row{border-top:1px solid var(--border);transition:border-color .2s}
    .contact-row:last-child{border-bottom:1px solid var(--border)}
    .contact-row:hover{border-color:rgba(200,169,110,.25)}

    .contact-row td{padding:1.5rem 0;vertical-align:middle}

    .ct-label{width:180px;font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);padding-right:2rem}
    .ct-value{font-size:.82rem;letter-spacing:.04em;color:var(--text)}
    .ct-value a{color:var(--text);text-decoration:none;transition:color .2s;position:relative}
    .ct-value a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--accent);transition:width .25s ease}
    .ct-value a:hover{color:var(--accent)}
    .ct-value a:hover::after{width:100%}
    .ct-action{width:90px;text-align:right}
    .ct-arrow{font-size:.6rem;letter-spacing:.12em;color:var(--border);transition:color .2s,transform .2s;display:inline-block}
    .contact-row:hover .ct-arrow{color:var(--accent);transform:translateX(3px)}

    /* DIVIDER */
    .contact-divider{height:3rem}

    footer{border-top:1px solid var(--border);padding:2rem 4rem;display:flex;justify-content:space-between;font-size:.62rem;letter-spacing:.15em;color:var(--muted)}
  </style>
</head>
